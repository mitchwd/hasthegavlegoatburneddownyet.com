[tools]
node = "25"
bun = "latest"
vercel = "latest"

[tasks]
[tasks.lint]
description = "Run linting and fix any issues"
hide = true
run = "bun run lint:fix"

[tasks.format]
description = "Run formatting and fix any issues"
hide = true
run = "bun run format"

[tasks.tsc]
description = "Run typecheck and fix any issues"
hide = true
run = "bun run tsc"

[tasks.check]
description = "Run all checks (format, lint, tsc) and fix any issues"
depends = ['format', 'lint', 'tsc']

[tasks.dev]
description = "Run development server"
run = "bun run dev"

[tasks.build]
description = "Run build script"
run = "bun run build"

[tasks.test]
description = "Run all tests"
run = "bun run test"
